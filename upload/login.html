<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة ابن حيان الطبية - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'IBM Plex Sans Arabic', sans-serif; }</style>
</head>
<body class="bg-gray-100/60 min-h-screen flex items-center justify-center p-4 text-right">
    <div class="bg-white rounded-2xl max-w-md w-full shadow-2xl border border-gray-100 p-6 space-y-6">
        <div class="text-center space-y-2">
            <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-black shadow-lg shadow-indigo-100 mx-auto text-xl">H</div>
            <h2 class="text-lg font-bold text-gray-800">تسجيل الدخول للمنظومة</h2>
            <p class="text-xs text-gray-400">منظومة ابن حيان لإدارة العيادات والمراكز الطبية</p>
        </div>
        <form onsubmit="handleLogin(event)" class="space-y-4 text-xs">
            <div class="space-y-1">
                <label class="font-bold text-gray-600 block">اسم المستخدم:</label>
                <input type="text" id="usernameInput" required placeholder="superadmin أو doctor_lab" class="w-full border border-gray-200 rounded-xl p-3 bg-gray-50 focus:outline-indigo-500 font-medium">
            </div>
            <div class="space-y-1">
                <label class="font-bold text-gray-600 block">كلمة المرور:</label>
                <input type="password" id="passwordInput" required placeholder="••••••••" class="w-full border border-gray-200 rounded-xl p-3 bg-gray-50 focus:outline-indigo-500 font-medium">
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition shadow-md shadow-indigo-100 text-xs">تسجيل الدخول</button>
        </form>
        <div class="pt-4 border-t border-gray-100 space-y-2">
            <span class="text-[11px] font-bold text-gray-400 block text-center">اضغط للاختيار السريع للحساب التجريبي:</span>
            <div class="grid grid-cols-2 gap-2 text-[10px]">
                <button onclick="fillDemo('superadmin', 'admin123')" class="p-2 bg-gray-50 rounded-lg hover:bg-indigo-50 text-gray-700 font-bold border border-gray-100 text-right">🔑 السوبر أدمن الأعلى</button>
                <button onclick="fillDemo('manager_kzo', 'kzo123')" class="p-2 bg-gray-50 rounded-lg hover:bg-purple-50 text-purple-700 font-bold border border-purple-100 text-right">✨ كوزمو والتجميل</button>
                <button onclick="fillDemo('doctor_pedia', 'pedia123')" class="p-2 bg-gray-50 rounded-lg hover:bg-blue-50 text-blue-700 font-bold border border-blue-100 text-right">👶 عيادة الأطفال</button>
                <button onclick="fillDemo('doctor_internal', 'internal123')" class="p-2 bg-gray-50 rounded-lg hover:bg-teal-50 text-teal-700 font-bold border border-teal-100 text-right">🩺 عيادة الباطنية</button>
                <button onclick="fillDemo('doctor_dental', 'dental123')" class="p-2 bg-gray-50 rounded-lg hover:bg-emerald-50 text-emerald-700 font-bold border border-emerald-100 text-right">🦷 عيادة الأسنان</button>
                <button onclick="fillDemo('doctor_lab', 'lab123')" class="p-2 bg-gray-50 rounded-lg hover:bg-cyan-50 text-cyan-700 font-bold border border-cyan-100 text-right">🔬 مختبر التحليلات</button>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
